<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Veriyo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body>

<nav class="navbar navbar--top">
        <a href="welcome.html" class="nav-logo">
            <img src="logo.png" alt="Veriyo">
        </a>
    </nav>

    <main class="container" style="padding-top:2rem;">
        <div class="auth-card" style="max-width:420px; margin:0 auto;">
            <div class="auth-logo" style="text-align:center; margin-bottom:1.5rem;">
                <img src="logo.png" alt="Veriyo" style="height:48px;">
            </div>

            <!-- Sign In Panel -->
            <div id="signinPanel">
                <h1 class="auth-title" style="font-size:1.5rem; margin-bottom:0.5rem;">Welcome back</h1>
                <p class="auth-subtitle" style="color:var(--text-secondary); margin-bottom:1.5rem;">Sign in to your Veriyo account</p>

                <div id="signinError" class="auth-error" style="display:none;"></div>

                <form id="signinForm" novalidate>
                    <div class="auth-field" style="margin-bottom:1rem;">
                        <label for="signinEmail" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">Email address</label>
                        <input type="email" id="signinEmail" class="form-control" required
                            placeholder="you@example.com" autocomplete="email">
                        <span class="auth-field-error" id="signinEmailError" style="font-size:0.82rem; color:var(--danger-color); display:none;"></span>
                    </div>
                    <div class="auth-field" style="margin-bottom:1.25rem;">
                        <label for="signinPassword" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">Password</label>
                        <input type="password" id="signinPassword" class="form-control" required
                            placeholder="Your password" autocomplete="current-password">
                    </div>
                    <button type="submit" id="signinBtn" class="btn btn-primary auth-submit-btn" style="width:100%; padding:0.85rem; font-size:1rem;">
                        Sign In
                    </button>
                </form>

                <p class="auth-toggle-text" style="text-align:center; margin-top:1.25rem; font-size:0.88rem; color:var(--text-secondary);">
                    Don't have an account?
                    <a href="#" id="showSignup" class="auth-toggle-link" style="color:var(--primary-accent); font-weight:600; cursor:pointer;">Create one</a>
                </p>
            </div>

            <!-- Sign Up Panel -->
            <div id="signupPanel" style="display:none;">
                <h1 class="auth-title" style="font-size:1.5rem; margin-bottom:0.5rem;">Create your account</h1>
                <p class="auth-subtitle" style="color:var(--text-secondary); margin-bottom:1.5rem;">Join Veriyo — it's free</p>

                <div id="signupError" class="auth-error" style="display:none;"></div>

                <div class="auth-type-toggle" style="display:flex; gap:0.5rem; margin-bottom:1.25rem; border:1px solid var(--border-color); border-radius:var(--radius); padding:0.25rem;">
                    <button type="button" id="typeMotoristBtn" class="auth-type-btn" data-type="motorist" style="flex:1; padding:0.6rem; border:none; border-radius:6px; background:var(--primary-accent); color:var(--bg-color); font-weight:600; cursor:pointer; transition:var(--transition);">Motorist</button>
                    <button type="button" id="typeWorkshopBtn" class="auth-type-btn" data-type="workshop" style="flex:1; padding:0.6rem; border:none; border-radius:6px; background:transparent; color:var(--text-secondary); font-weight:600; cursor:pointer; transition:var(--transition);">Workshop</button>
                </div>

                <form id="signupForm" novalidate>
                    <div id="motoristNameFields">
                        <div class="auth-field" style="margin-bottom:1rem;">
                            <label for="signupFirstName" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">First name</label>
                            <input type="text" id="signupFirstName" class="form-control" required
                                placeholder="First name" autocomplete="given-name">
                        </div>
                        <div class="auth-field" style="margin-bottom:1rem;">
                            <label for="signupLastName" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">Last name</label>
                            <input type="text" id="signupLastName" class="form-control" required
                                placeholder="Last name" autocomplete="family-name">
                        </div>
                    </div>
                    <div id="workshopNameField" style="display:none;">
                        <div class="auth-field" style="margin-bottom:1rem;">
                            <label for="signupWorkshopName" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">Workshop name</label>
                            <input type="text" id="signupWorkshopName" class="form-control"
                                placeholder="Your workshop's name" autocomplete="organization">
                        </div>
                    </div>
                    <span class="auth-field-error" id="signupNameError" style="font-size:0.82rem; color:var(--danger-color); display:none; margin-top:-0.5rem; margin-bottom:0.75rem;"></span>
                    <div class="auth-field" style="margin-bottom:1rem;">
                        <label for="signupEmail" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">Email address</label>
                        <input type="email" id="signupEmail" class="form-control" required
                            placeholder="you@example.com" autocomplete="email">
                        <span class="auth-field-error" id="signupEmailError" style="font-size:0.82rem; color:var(--danger-color); display:none;"></span>
                    </div>
                    <div class="auth-field" style="margin-bottom:1rem;">
                        <label for="signupPassword" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">Password</label>
                        <input type="password" id="signupPassword" class="form-control" required
                            placeholder="At least 8 characters" autocomplete="new-password">
                    </div>
                    <div class="auth-field" style="margin-bottom:1.25rem;">
                        <label for="signupConfirm" style="display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.4rem; color:var(--text-secondary);">Confirm password</label>
                        <input type="password" id="signupConfirm" class="form-control" required
                            placeholder="Repeat your password" autocomplete="new-password">
                        <span class="auth-field-error" id="signupConfirmError" style="font-size:0.82rem; color:var(--danger-color); display:none;"></span>
                    </div>
                    <button type="submit" id="signupBtn" class="btn btn-primary auth-submit-btn" style="width:100%; padding:0.85rem; font-size:1rem;">
                        Create Account
                    </button>
                </form>

                <p class="auth-toggle-text" style="text-align:center; margin-top:1.25rem; font-size:0.88rem; color:var(--text-secondary);">
                    Already have an account?
                    <a href="#" id="showSignin" class="auth-toggle-link" style="color:var(--primary-accent); font-weight:600; cursor:pointer;">Sign in</a>
                </p>
            </div>
        </div>
    </main>



<nav class="bottom-nav bottom-nav--legal-only">
<p class="bottom-nav-legal">&copy; Veriyo | Built for South African drivers <a href="privacy.html">Privacy Policy</a></p>
</nav>
    <div class="svg-sprite-loader" id="svgSpriteLoader" aria-hidden="true"></div>
    <script>
    fetch('icons.svg')
        .then(r => r.text())
        .then(svg => {
            document.getElementById('svgSpriteLoader').innerHTML = svg;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function () {
        const SUPABASE_URL = 'https://xxigkehuqtwaihyxaahk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4aWdrZWh1cXR3YWloeXhhYWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODQzNjQsImV4cCI6MjA5NTM2MDM2NH0.HNLzFWXGZw6jAxl9IHvJ2IOWPSJiC3iKoC1UXmsUQPc';
        const _supabaseAuth = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
        const params = new URLSearchParams(window.location.search);
        const isWorkshopFlow = params.get('redirect') === 'list-workshop' || params.get('redirect') === 'claim-workshop';
        let selectedType = isWorkshopFlow ? 'workshop' : 'motorist';

        function validateEmail(email) {
            return EMAIL_RE.test(email);
        }

        function showPanel(name) {
            document.getElementById('signinPanel').style.display = name === 'signin' ? '' : 'none';
            document.getElementById('signupPanel').style.display = name === 'signup' ? '' : 'none';
        }

        function setAccountType(type) {
            selectedType = type;
            const motoristBtn = document.getElementById('typeMotoristBtn');
            const workshopBtn = document.getElementById('typeWorkshopBtn');
            const motoristFields = document.getElementById('motoristNameFields');
            const workshopField = document.getElementById('workshopNameField');

            motoristBtn.style.background = type === 'motorist' ? 'var(--primary-accent)' : 'transparent';
            motoristBtn.style.color = type === 'motorist' ? 'var(--bg-color)' : 'var(--text-secondary)';
            workshopBtn.style.background = type === 'workshop' ? 'var(--primary-accent)' : 'transparent';
            workshopBtn.style.color = type === 'workshop' ? 'var(--bg-color)' : 'var(--text-secondary)';

            motoristFields.style.display = type === 'motorist' ? '' : 'none';
            workshopField.style.display = type === 'workshop' ? '' : 'none';

            document.getElementById('signupFirstName').required = type === 'motorist';
            document.getElementById('signupLastName').required = type === 'motorist';
        }

        function setError(elId, msg) {
            const el = document.getElementById(elId);
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        function clearErrors() {
            ['signinError', 'signinEmailError', 'signupError', 'signupEmailError', 'signupConfirmError'].forEach(id => setError(id, ''));
        }

        function humaniseError(msg) {
            if (!msg) return 'Something went wrong. Please try again.';
            if (msg.includes('User already registered')) return 'An account with this email already exists. Please sign in instead.';
            if (msg.includes('Invalid login credentials')) return 'Incorrect email or password. Please try again.';
            return msg;
        }

        function getRedirectUrl(accountType) {
            const redirect = params.get('redirect');
            // Deep-link redirects only apply if they match the account's real type —
            // a motorist account never lands on a workshop-only page, and vice versa (spec 8.5).
            if (accountType === 'workshop' && redirect === 'list-workshop') {
                return 'list-workshop.html';
            }
            if (accountType === 'motorist' && redirect === 'claim-workshop') {
                const workshopId = params.get('workshop_id');
                if (workshopId) {
                    return 'claim-workshop.html?id=' + encodeURIComponent(workshopId);
                }
                return 'workshops.html';
            }
            return accountType === 'workshop' ? 'workshop-home.html' : 'motorist-home.html';
        }

        async function afterAuthSuccess(userId) {
            const { data: profile, error } = await _supabaseAuth
                .from('account_profiles')
                .select('account_type')
                .eq('user_id', userId)
                .single();

            // If we can't read the profile, fail safe to the motorist home rather than guessing.
            const accountType = (!error && profile) ? profile.account_type : 'motorist';

            const chatRedirect = sessionStorage.getItem('veriyo_chat_redirect');
            if (chatRedirect) {
                sessionStorage.removeItem('veriyo_chat_redirect');
                window.location.href = chatRedirect;
            } else {
                window.location.href = getRedirectUrl(accountType);
            }
        }

        // Update UI text for workshop flow (arrived via list-workshop / claim-workshop deep link)
        function updateUIForWorkshop() {
            if (isWorkshopFlow) {
                document.querySelector('#signupPanel h1').textContent = 'Create Workshop Account';
                document.querySelector('#signupPanel .auth-subtitle').textContent = 'Register your workshop on Veriyo';
                document.getElementById('signupBtn').textContent = 'Create Workshop Account';
            }
        }

        // Check for signup param to show signup panel
        if (params.get('signup') === '1') {
            showPanel('signup');
        }

        updateUIForWorkshop();

        document.getElementById('showSignup').addEventListener('click', function (e) {
            e.preventDefault();
            clearErrors();
            showPanel('signup');
        });

        document.getElementById('showSignin').addEventListener('click', function (e) {
            e.preventDefault();
            clearErrors();
            showPanel('signin');
        });

        document.getElementById('signinForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            clearErrors();

            const email = document.getElementById('signinEmail').value.trim();
            const password = document.getElementById('signinPassword').value;

            if (!validateEmail(email)) {
                setError('signinEmailError', 'Please enter a valid email address');
                return;
            }

            const btn = document.getElementById('signinBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in…';

            const { data, error } = await _supabaseAuth.auth.signInWithPassword({ email, password });

            if (error) {
                setError('signinError', humaniseError(error.message));
                btn.disabled = false;
                btn.textContent = 'Sign In';
            } else {
                await afterAuthSuccess(data.user.id);
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            clearErrors();
            setError('signupNameError', '');

            const firstName = document.getElementById('signupFirstName').value.trim();
            const lastName = document.getElementById('signupLastName').value.trim();
            const workshopName = document.getElementById('signupWorkshopName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            if (selectedType === 'motorist' && (!firstName || !lastName)) {
                setError('signupNameError', 'First and last name are required.');
                return;
            }
            if (selectedType === 'workshop' && !workshopName) {
                setError('signupNameError', 'Workshop name is required.');
                return;
            }

            if (!validateEmail(email)) {
                setError('signupEmailError', 'Please enter a valid email address');
                return;
            }

            if (password.length < 8) {
                setError('signupError', 'Password must be at least 8 characters.');
                return;
            }

            if (password !== confirm) {
                setError('signupConfirmError', 'Passwords do not match.');
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account…';

            const displayName = selectedType === 'motorist' ? (firstName + ' ' + lastName) : workshopName;

            const { data: signUpData, error } = await _supabaseAuth.auth.signUp({
                email,
                password,
                options: {
                    emailRedirectTo: null,
                    data: { display_name: displayName }
                }
            });

            if (error) {
                setError('signupError', humaniseError(error.message));
                btn.disabled = false;
                btn.textContent = isWorkshopFlow ? 'Create Workshop Account' : 'Create Account';
                return;
            }

            const { error: signinErr, data: signinData } = await _supabaseAuth.auth.signInWithPassword({ email, password });
            if (signinErr) {
                setError('signupError', humaniseError(signinErr.message));
                btn.disabled = false;
                btn.textContent = isWorkshopFlow ? 'Create Workshop Account' : 'Create Account';
                return;
            }

            const userId = signinData.user.id;
            const { error: profileErr } = await _supabaseAuth.from('account_profiles').insert({
                user_id: userId,
                account_type: selectedType,
                first_name: selectedType === 'motorist' ? firstName : null,
                last_name: selectedType === 'motorist' ? lastName : null,
                workshop_name: selectedType === 'workshop' ? workshopName : null
            });

            if (profileErr) {
                setError('signupError', 'Account created, but we could not save your profile details. Please contact support.');
                btn.disabled = false;
                btn.textContent = isWorkshopFlow ? 'Create Workshop Account' : 'Create Account';
                return;
            }

            await afterAuthSuccess(userId);
        });

        document.getElementById('typeMotoristBtn').addEventListener('click', function () {
            setAccountType('motorist');
        });
        document.getElementById('typeWorkshopBtn').addEventListener('click', function () {
            setAccountType('workshop');
        });
        setAccountType(selectedType);
    })();
    </script>
</body>
</html>
