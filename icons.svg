  <!-- TAG: solid price tag with hole -->
  <symbol id="icon-tag" viewBox="0 0 24 24" fill="currentColor">
    <path d="M20.6 11.1L12.9 3.4A2 2 0 0011.5 2.8H4a2 2 0 00-2 2v7.5c0 .53.21 1.04.59 1.41l7.7 7.7c.78.78 2.05.78 2.83 0l7.48-7.48c.78-.78.78-2.05 0-2.83zM7 8a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
