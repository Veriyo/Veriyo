    <path d="M3 9h18v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
    <circle cx="8" cy="13.5" r="1.15"/>
    <circle cx="12" cy="13.5" r="1.15"/>
    <circle cx="16" cy="13.5" r="1.15"/>
    <circle cx="8" cy="17.5" r="1.15"/>
    <circle cx="12" cy="17.5" r="1.15"/>
    <circle cx="16" cy="17.5" r="1.15"/>
  </symbol>

