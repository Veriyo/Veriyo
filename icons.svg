<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">

  <!-- HOME: solid house with roof, walls, and door -->
  <symbol id="icon-home" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2.1L1 11h3v11h6v-7h4v7h6V11h3L12 2.1zm0 2.6l7 6.3V20h-3v-7H8v7H5V11l7-6.3z"/>
    <path d="M12 3L2 11.5h2.5V21h5.5v-6.5h4V21h5.5V11.5H22L12 3z"/>
  </symbol>

  <!-- PRICES: bold Rand R in a solid circle -->
<symbol id="icon-prices" viewBox="0 0 24 24" fill="currentColor">
    <path d="M11.5 2c-5.25 0-9.5 4.25-9.5 9.5S6.25 21 11.5 21 21 16.75 21 11.5 16.75 2 11.5 2zm1.25 14.5v1.25h-2.5V16.5c-1.5-.25-2.75-1-3.5-2.25l1.75-1c.5.75 1.25 1.25 2.25 1.25.75 0 1.5-.5 1.5-1.25 0-.5-.25-.75-1.75-1.25-2-.75-3.25-1.5-3.25-3.25 0-1.5 1.25-2.75 3-3V4.25h2.5V5.5c1.25.25 2.25 1 2.75 2l-1.75 1c-.25-.75-.75-1.25-1.75-1.25-.75 0-1.25.5-1.25 1s.25.75 1.75 1.25c2.25.75 3.25 1.75 3.25 3.25 0 1.75-1.25 3-3 3.25z"/>
</symbol>

  <!-- REPORT: solid clipboard with lines -->
  <symbol id="icon-report" viewBox="0 0 24 24" fill="currentColor">
    <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5a2 2 0 00-2 2v16a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 0a1 1 0 110 2 1 1 0 010-2zm-2 14H7v-2h3v2zm6 0h-4v-2h4v2zm0-4H7v-2h9v2zm0-4H7V7h9v2z"/>
  </symbol>

  <!-- WORKSHOPS: solid wrench -->
  <symbol id="icon-workshops" viewBox="0 0 24 24" fill="currentColor">
    <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
  </symbol>

  <!-- OVERVIEW: solid bar chart, 3 bars increasing height -->
  <symbol id="icon-overview" viewBox="0 0 24 24" fill="currentColor">
    <path d="M5 20V10H2v10h3zm7 0V4h-3v16h3zm7 0v-7h-3v7h3zM2 22h20v-2H2v2z"/>
  </symbol>

  <!-- LISTING: solid ID card with avatar circle and text lines -->
  <symbol id="icon-listing" viewBox="0 0 24 24" fill="currentColor">
    <path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zM8 13a2.5 2.5 0 110-5 2.5 2.5 0 010 5zm8-1h-4v-2h4v2zm0-3h-4V7h4v2z"/>
  </symbol>

  <!-- ADD LISTING: solid circle with bold plus -->
  <symbol id="icon-addlisting" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
  </symbol>

  <!-- STAR: solid 5-point star, used for the rating badge -->
  <symbol id="icon-star" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2.5l2.9 6.1 6.6.9-4.8 4.7 1.2 6.6L12 17.6l-5.9 3.2 1.2-6.6-4.8-4.7 6.6-.9L12 2.5z"/>
  </symbol>

  <!-- LOCATION: solid map pin -->
  <symbol id="icon-location" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 6.4 11.36 7.16 12.06.24.22.62.22.86 0C13.6 21.36 20 15.25 20 10c0-4.42-3.58-8-8-8zm0 10.5A2.5 2.5 0 1112 7.5a2.5 2.5 0 010 5z"/>
  </symbol>

  <!-- CLOCK: solid ring with hour/minute hands -->
    <symbol id="icon-clock" viewBox="0 0 24 24" fill="currentColor">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 22a10 10 0 100-20 10 10 0 000 20zm0-2a8 8 0 110-16 8 8 0 010 16z"/>
    <path d="M13 7h-2v5.41l4.29 4.3 1.42-1.42L13 11.59V7z"/>
  </symbol>


  <!-- CALENDAR: page with two hanger rings and a 3x2 grid of 6 dots -->
 <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="16" rx="2"/>
    <path d="M8 3v4M16 3v4M3 9h18"/>
    <circle cx="8" cy="13" r="0.8" fill="currentColor" stroke="none"/>
    <circle cx="12" cy="13" r="0.8" fill="currentColor" stroke="none"/>
    <circle cx="16" cy="13" r="0.8" fill="currentColor" stroke="none"/>
    <circle cx="8" cy="17" r="0.8" fill="currentColor" stroke="none"/>
    <circle cx="12" cy="17" r="0.8" fill="currentColor" stroke="none"/>
    <circle cx="16" cy="17" r="0.8" fill="currentColor" stroke="none"/>
</symbol>
  <!-- TOOLS: crossed wrench, used for specialisations -->
<symbol id="icon-tools" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">

    <path d="M14.2 3.5a4.2 4.2 0 0 0 5.3 5.3l-4.3 4.3"/>
    <path d="M9.8 20.5a4.2 4.2 0 0 1-5.3-5.3l4.3-4.3"/>

    <path d="M8.2 8.2l7.6 7.6"/>

    <path d="M5.8 7.2l2.8 2.8"/>
    <path d="M7.2 5.8l2.8 2.8"/>

    <path d="M14.8 14.8l3.4 3.4"/>
    <path d="M18.2 18.2l.8.8"/>

</symbol>

  <!-- CHAT: solid speech bubble with tail -->
<symbol id="icon-chat" viewBox="0 0 24 24" fill="currentColor">

    <path d="M5 6.5C5 4.6 6.6 3 8.5 3h7C18.5 3 20 4.5 20 6.5v5c0 2-1.5 3.5-3.5 3.5H11l-4.5 4v-4H8.5C6.6 15 5 13.4 5 11.5z"/>

</symbol>

  <!-- TAG: solid price tag with hole -->
<symbol id="icon-tag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">

    <path d="M3 10V5h5l10 10a2 2 0 0 1 0 2.8l-.2.2a2 2 0 0 1-2.8 0L3 10z"/>

    <circle cx="7.5" cy="7.5" r="1.1" fill="currentColor" stroke="none"/>

</symbol>
  <!-- PEOPLE: two overlapping solid figures -->
<symbol id="icon-people" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">

    <circle cx="9" cy="8" r="2.4"/>
    <circle cx="17" cy="9" r="2"/>

    <path d="M4 18c0-3 2.5-5 5-5s5 2 5 5"/>

    <path d="M14 18c.2-2.3 2-4 4.2-4S22 15.8 22 18"/>

</symbol>
  <!-- CHEVRON DOWN: accordion toggle indicator -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 15.3L5.7 9l1.4-1.4L12 12.5l4.9-4.9L18.3 9z"/>
  </symbol>

</svg>
