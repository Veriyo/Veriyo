    <path d="M8.5 11a3 3 0 100-6 3 3 0 000 6zm7-1a2.5 2.5 0 100-5 2.5 2.5 0 000 5zM8.5 12.5C5.8 12.5 1 13.9 1 16.6V19h11.9v-2.4c0-2.7-4.7-4.1-4.4-4.1zm7 .05c-.34 0-.7.02-1.09.06 1.32.95 2.24 2.24 2.24 3.85V19H23v-2.35c0-2.35-3.86-3.6-6.5-3.6z"/>
  </symbol>

  <!-- CHEVRON DOWN: accordion toggle indicator -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 15.3L5.7 9l1.4-1.4L12 12.5l4.9-4.9L18.3 9z"/>
