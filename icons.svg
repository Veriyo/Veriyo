  <symbol id="icon-building" viewBox="0 0 24 24" fill="currentColor">
    <path d="M4 21V9.5a1 1 0 01.45-.83l7-4.67a1 1 0 011.1 0l7 4.67a1 1 0 01.45.83V21a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4h-3v4a1 1 0 01-1 1H5a1 1 0 01-1-1zm5-8h2v-2H9v2zm4 0h2v-2h-2v2zM9 9h2V7H9v2zm4 0h2V7h-2v2z"/>
  </symbol>

  <!-- TROPHY: achievement / thank-you banner -->
  <symbol id="icon-trophy" viewBox="0 0 24 24" fill="currentColor">
    <path d="M7 3a1 1 0 00-1 1v1H4.5A1.5 1.5 0 003 6.5v1A3.5 3.5 0 006.5 11h.2A5.02 5.02 0 0011 14.9V17H9a1 1 0 000 2h6a1 1 0 000-2h-2v-2.1a5.02 5.02 0 004.3-3.9h.2A3.5 3.5 0 0021 7.5v-1A1.5 1.5 0 0019.5 5H18V4a1 1 0 00-1-1H7zm-1 4v2.5A1.5 1.5 0 015 8v-1h1zm12 0h1v1a1.5 1.5 0 01-1 1.42V7z"/>
    <path d="M9 20h6a1 1 0 011 1v.2a.8.8 0 01-.8.8H8.8a.8.8 0 01-.8-.8V21a1 1 0 011-1z"/>
