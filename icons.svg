    <rect x="12.4" y="18.3" width="2.1" height="2.7" rx="0.9"/>
    <path d="M3.4 12.2c-.9.2-1.5 1.2-1.2 2.1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
