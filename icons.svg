    <path d="M12 15.3L5.7 9l1.4-1.4L12 12.5l4.9-4.9L18.3 9z"/>
  </symbol>

  <!-- ============================================================ -->
  <!-- NEW ICONS — designed to match the icon set above             -->
  <!-- (needed for the Motorist / Workshop landing + dashboard mocks) -->
  <!-- ============================================================ -->

  <!-- SEARCH: magnifying glass, used for "Check Repair Prices" + search bars -->
  <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
