    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM19.7 8.04a1 1 0 000-1.41l-2.33-2.34a1 1 0 00-1.41 0l-1.84 1.83 3.75 3.75 1.83-1.83z"/>
