<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
    <title>Browse Repair Prices - Veriyo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar navbar--top">
        <a href="welcome.html" class="nav-logo">
            <img src="logo.png" alt="Veriyo">
        </a>
        <ul class="nav-links">
            <li><a href="motorist-home.html">Home</a></li>
            <li><a href="prices.html" class="active">Prices</a></li>
            <li><a href="report.html">Report</a></li>
            <li><a href="workshops.html">Workshops</a></li>
        </ul>
    </nav>

    <main class="container">
        <header style="margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Approved Repair Benchmarks</h1>
            <p style="color: var(--text-secondary);">Examine authentic cost indices generated entirely from approved invoices submitted across your region.</p>
        </header>
        <section class="filter-wrapper" aria-label="Data Filter Controls">
            <button id="filterToggleBtn" style="display:none; width:100%; background:var(--surface-color); color:var(--text-primary); border:1px solid var(--border-color); border-radius:var(--radius); padding:0.75rem 1rem; font-size:0.95rem; font-weight:600; cursor:pointer; margin-bottom:0.75rem; text-align:left;">&#9660; Filter &amp; Sort</button>
            <div class="filter-grid" id="filterGridPanel">
                <div class="filter-group">
                    <label for="filterSuburb">Filter by Suburb</label>
                    <input type="text" id="filterSuburb" class="form-control" placeholder="e.g. Mayfair, Rosebank..." list="suburbSuggestions" autocomplete="off">
                    <datalist id="suburbSuggestions"></datalist>
                </div>
                <div class="filter-group">
                    <label for="filterMake">Car Make</label>
                    <select id="filterMake" class="form-control">
                        <option value="All">All Makes</option>
                        <option value="Toyota">Toyota</option>
                        <option value="VW">VW</option>
                        <option value="Ford">Ford</option>
                        <option value="Hyundai">Hyundai</option>
                        <option value="Kia">Kia</option>
                        <option value="BMW">BMW</option>
                        <option value="Mercedes">Mercedes</option>
                        <option value="Nissan">Nissan</option>
                        <option value="Mazda">Mazda</option>
                        <option value="Suzuki">Suzuki</option>
                        <option value="Renault">Renault</option>
                        <option value="Unknown">Unknown/Other</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterRepair">Repair Type</label>
                    <select id="filterRepair" class="form-control">
                        <option value="All">All Mechanical Subsystems</option>
                        <option value="Oil Change">Oil Change</option>
                        <option value="Minor Service">Minor Service</option>
                        <option value="Major Service">Major Service</option>
                        <option value="Brakes">Brakes</option>
                        <option value="Clutch">Clutch</option>
                        <option value="Tyres">Tyres</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Engine">Engine</option>
                        <option value="Gearbox">Gearbox</option>
                        <option value="Body Work">Body Work</option>
                        <option value="Suspension">Suspension</option>
                        <option value="Sound Installation">Sound Installation</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterRating">Rating Threshold</label>
                    <select id="filterRating" class="form-control">
                        <option value="All">All Ratings</option>
                        <option value="1">1 Star and above</option>
                        <option value="2">2 Stars and above</option>
                        <option value="3">3 Stars and above</option>
                        <option value="4">4 Stars and above</option>
                        <option value="5">5 Stars only</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sortBy">Sort By</label>
                    <select id="sortBy" class="form-control">
                        <option value="mostRecent">Most Recent</option>
                        <option value="highestAmount">Highest Amount</option>
                        <option value="lowestAmount">Lowest Amount</option>
                        <option value="lowestRated">Lowest Rated</option>
                    </select>
                </div>
            </div>
        </section>
        <section id="pricesContainer" class="prices-grid" aria-live="polite"></section>
    </main>



<nav class="bottom-nav">
        <div class="bottom-nav-links">
            <a href="motorist-home.html" class="bottom-nav-item">
                <span class="bottom-nav-icon">
                    <svg width="22" height="22" aria-hidden="true"><use href="icons.svg#icon-home"></use></svg>
                </span>
                <span class="bottom-nav-label">Home</span>
            </a>
            <a href="prices.html" class="bottom-nav-item active">
                <span class="bottom-nav-icon">
                    <svg width="22" height="22" aria-hidden="true"><use href="icons.svg#icon-prices"></use></svg>
                </span>
                <span class="bottom-nav-label">Prices</span>
            </a>
            <a href="report.html" class="bottom-nav-item">
                <span class="bottom-nav-icon">
                    <svg width="22" height="22" aria-hidden="true"><use href="icons.svg#icon-report"></use></svg>
                </span>
                <span class="bottom-nav-label">Report</span>
            </a>
            <a href="workshops.html" class="bottom-nav-item">
                <span class="bottom-nav-icon">
                    <svg width="22" height="22" aria-hidden="true"><use href="icons.svg#icon-workshops"></use></svg>
                </span>
                <span class="bottom-nav-label">Workshops</span>
            </a>
        </div>
<p class="bottom-nav-legal">&copy; Veriyo | Built for South African drivers <a href="privacy.html">Privacy Policy</a></p>
    </nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="main.js"></script>
    <script src="prices.js"></script>
</body>
</html>
